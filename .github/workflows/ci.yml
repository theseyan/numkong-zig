name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-linux-gnu
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-linux-gnu
          - name: macos-aarch64
            os: macos-14
            target: aarch64-macos
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-windows-gnu
          - name: windows-aarch64
            os: windows-11-arm
            target: aarch64-windows-gnu
    runs-on: ${{ matrix.os }}
    name: test-${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format Check
        run: zig fmt --check build.zig src bench

      - name: Run Tests
        run: zig build test -Dtarget=${{ matrix.target }}
